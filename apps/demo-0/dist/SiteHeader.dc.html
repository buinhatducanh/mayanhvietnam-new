<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<div style="font-family: 'Outfit', sans-serif; background: rgba(255,255,255,0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid #e9e6e1;">
  <!-- Row 1: utility strip -->
  <div sc-camel-style="{{ row1Style }}">
    <div style="max-width: 1280px; margin: 0 auto; padding: 7px 32px; display: flex; align-items: center; justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 14px;">
        <a href="tel:0937148222" style="display: flex; align-items: center; gap: 7px; color: #cfc9c2; text-decoration: none; font-size: 12px; letter-spacing: 0.02em;" style-hover="color: #ffffff;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff6a00" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          <span style="font-weight: 600;">0937.148.222</span>
        </a>
        <span style="color: #3d3831;">|</span>
        <span style="color: #7a746c; font-size: 12px;">Freeship đơn từ 5.000.000đ · Hỗ trợ 9:00 – 19:00</span>
      </div>
      <div style="display: flex; align-items: center; gap: 22px;">
        <a href="Danh Mục.dc.html#tat-ca" style="color: #cfc9c2; text-decoration: none; font-size: 12px;" style-hover="color: #ff8a3d;">Xem tất cả sản phẩm</a>
        <a href="Trang Chủ.dc.html#flash-sale" style="color: #cfc9c2; text-decoration: none; font-size: 12px;" style-hover="color: #ff8a3d;">⚡ Flash Sale</a>
        <a href="Danh Mục.dc.html#tat-ca" style="color: #cfc9c2; text-decoration: none; font-size: 12px;" style-hover="color: #ff8a3d;">🎁 Khuyến mãi</a>
        <a href="Danh Mục.dc.html#san-pham-cu" style="color: #cfc9c2; text-decoration: none; font-size: 12px;" style-hover="color: #ff8a3d;">♻️ Sản phẩm cũ</a>
      </div>
    </div>
  </div>

  <!-- Row 2: logo · search · actions -->
  <div style="border-bottom: 1px solid #f1eee9;">
    <div style="max-width: 1280px; margin: 0 auto; padding: 11px 32px; display: flex; align-items: center; gap: 22px;">
      <a href="Trang Chủ.dc.html" title="Máy Ảnh Việt Nam" style="flex-shrink: 0; display: flex; align-items: center; background: #16130f; border-radius: 10px; padding: 7px 12px; text-decoration: none; transition: transform 0.2s ease, box-shadow 0.25s ease;" style-hover="transform: translateY(-1px); box-shadow: 0 10px 24px -10px rgba(22,19,15,0.45);">
        <img src="https://mayanhvietnam.com/asset/imgs/img/Logo_white.png" alt="Máy Ảnh Việt Nam" referrerpolicy="no-referrer" style="height: 26px; width: auto; object-fit: contain; display: block;">
      </a>

      <!-- Search -->
      <div style="position: relative; flex: 1; max-width: 560px; margin: 0 auto;">
        <div style="position: relative; display: flex; align-items: center;">
          <svg style="position: absolute; left: 13px; pointer-events: none;" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a39d94" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          <input type="text" value="{{ searchVal }}" onChange="{{ onSearch }}" onFocus="{{ onSearchFocus }}" onBlur="{{ onSearchBlur }}" placeholder="Tìm máy ảnh, ống kính, flycam..." style="width: 100%; height: 40px; padding: 0 44px 0 36px; border-radius: 12px; border: 1px solid #e9e6e1; background: #f7f5f1; font-family: 'Outfit', sans-serif; font-size: 13.5px; color: #16130f; outline: none; transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;" style-focus="border-color: #ff6a00; background: #ffffff; box-shadow: 0 0 0 3px rgba(255,106,0,0.12);">
          <span style="position: absolute; right: 5px; width: 30px; height: 30px; border-radius: 9px; background: #ff6a00; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 14px -6px rgba(255,106,0,0.55);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          </span>
        </div>
        <sc-if value="{{ searchOpen }}" hint-placeholder-val="{{ false }}">
          <div style="position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #ffffff; border: 1px solid #e9e6e1; border-radius: 14px; box-shadow: 0 24px 60px -20px rgba(22,19,15,0.25); overflow: hidden; z-index: 60;">
            <div style="padding: 7px 12px; background: #f7f5f1; font-family: 'Geist Mono', monospace; font-size: 9.5px; font-weight: 600; color: #a39d94; text-transform: uppercase; letter-spacing: 0.12em;">Gợi ý sản phẩm</div>
            <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
              <sc-for list="{{ searchResults }}" as="r" hint-placeholder-count="3">
                <a href="{{ r.pdpHref }}" style="display: flex; align-items: center; gap: 10px; padding: 9px 12px; text-decoration: none; border-top: 1px solid #f1eee9; transition: background 0.15s ease;" style-hover="background: #f9f7f3;">
                  <span style="width: 36px; height: 36px; border-radius: 9px; border: 1px solid #f1eee9; background: #ffffff; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center;"><img src="{{ r.thumbnail }}" alt="{{ r.name }}" referrerpolicy="no-referrer" style="width: 100%; height: 100%; object-fit: contain; padding: 2px;"></span>
                  <span style="min-width: 0; flex: 1; display: flex; flex-direction: column;">
                    <span style="font-size: 10px; font-weight: 700; color: #ff6a00; text-transform: uppercase; letter-spacing: 0.08em;">{{ r.brand }}</span>
                    <span style="font-size: 12.5px; font-weight: 500; color: #16130f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ r.name }}</span>
                  </span>
                  <span style="font-size: 12px; font-weight: 700; color: #ff6a00; flex-shrink: 0;">{{ r.priceLabel }}</span>
                </a>
              </sc-for>
            </sc-if>
            <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
              <div style="padding: 16px; text-align: center; font-size: 12.5px; color: #a39d94;">Không tìm thấy kết quả nào</div>
            </sc-if>
          </div>
        </sc-if>
      </div>

      <!-- Actions -->
      <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
        <a href="Sản Phẩm.dc.html" style="display: none;">.</a>
        <button type="button" aria-label="Tài khoản" title="Tài khoản" style="display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 13px; border-radius: 11px; border: 1px solid #e9e6e1; background: #ffffff; color: #5f5a53; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;" style-hover="border-color: rgba(255,106,0,0.45); color: #ff6a00; transform: translateY(-1px);" style-active="transform: scale(0.96);">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Tài khoản
        </button>
        <button type="button" aria-label="Giỏ hàng" title="Giỏ hàng" style="position: relative; display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 13px; border-radius: 11px; border: 1px solid #e9e6e1; background: #ffffff; color: #5f5a53; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;" style-hover="border-color: rgba(255,106,0,0.45); color: #ff6a00; transform: translateY(-1px);" style-active="transform: scale(0.96);">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
          Giỏ hàng
          <span style="position: absolute; top: -6px; right: -6px; min-width: 17px; height: 17px; border-radius: 999px; background: #ff6a00; color: #ffffff; font-size: 9.5px; font-weight: 800; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px -2px rgba(255,106,0,0.6);">0</span>
        </button>
        <a href="tel:0937148222" style="display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 17px; border-radius: 11px; background: #ff6a00; color: #ffffff; text-decoration: none; font-size: 13px; font-weight: 700; letter-spacing: 0.01em; box-shadow: 0 8px 20px -8px rgba(255,106,0,0.55); transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.25s ease;" style-hover="background: #ea6100; color: #ffffff; transform: translateY(-1px); box-shadow: 0 14px 28px -10px rgba(255,106,0,0.65);" style-active="transform: scale(0.97);">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          Đặt hàng
        </a>
      </div>
    </div>
  </div>

  <!-- Row 3: category nav strip -->
  <nav aria-label="Danh mục sản phẩm" sc-camel-style="{{ row3Style }}">
    <div style="display: flex; align-items: center; gap: 3px; overflow-x: auto; scrollbar-width: none;">
      <sc-for list="{{ catPills }}" as="c" hint-placeholder-count="9">
        <a href="{{ c.href }}" sc-camel-style="flex-shrink: 0; padding: 8px 13px; border-radius: 9px; font-size: 13px; font-weight: 550; color: {{ c.color }}; background: {{ c.bg }}; text-decoration: none; white-space: nowrap; transition: background 0.2s ease, color 0.2s ease;" style-hover="background: #f5f2ed; color: #16130f;">{{ c.name }}</a>
      </sc-for>
    </div>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 300}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;may-anh&quot;, &quot;ong-kinh&quot;, &quot;flycam&quot;, &quot;action-camera&quot;, &quot;phu-kien&quot;, &quot;thiet-bi-studio&quot;, &quot;may-quay-phim&quot;], &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Điều hướng&quot;}}">
class Component extends DCLogic {
  state = { ddOpen: false, searchVal: '', searchOpen: false, results: [], cats: [], scrolled: false };

  async componentDidMount() {
    this._data = await import('./data/products.js');
    this._blurTimer = null;
    this.setState({ cats: this._data.categories });

    this._handleScroll = () => {
      const isScrolled = window.scrollY > 40;
      if (isScrolled !== this.state.scrolled) {
        this.setState({ scrolled: isScrolled });
      }
    };
    window.addEventListener('scroll', this._handleScroll);
  }

  componentWillUnmount() {
    window.removeEventListener('scroll', this._handleScroll);
    clearTimeout(this._blurTimer);
  }

  renderVals() {
    const scrolled = this.state.scrolled;
    const active = this.props.active ?? 'home';
    const experiences = [
      { href: 'Flycam DJI.dc.html', icon: '🚁', title: 'Flycam — DJI Mavic Air 2', stat: '4K 60fps · Bay 34 phút' },
      { href: 'Action Camera Insta360.dc.html', icon: '🏍️', title: 'Action Cam — Insta360 ONE RS', stat: '6K 360° · FlowState' },
      { href: 'Máy Ảnh Canon R50.dc.html', icon: '📷', title: 'Máy ảnh — Canon EOS R50', stat: 'APS-C 24.2MP · 4K 30p' },
    ];
    const results = this.state.results.map((r) => ({
      ...r,
      pdpHref: this._data ? this._data.getProductUrl(r.slug) : `Sản Phẩm.dc.html#${r.slug}`,
      priceLabel: r.callForPrice ? 'Liên hệ' : `${r.price.toLocaleString('vi-VN')}đ`,
    }));
    return {
      row1Style: `background: #16130f; overflow: hidden; transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1); ${scrolled ? 'height: 0px; padding-top: 0px; padding-bottom: 0px; border-bottom-width: 0px;' : 'height: auto; padding-top: 7px; padding-bottom: 7px;'}`,
      row3Style: `max-width: 1280px; margin: 0 auto; overflow: hidden; transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1); ${scrolled ? 'height: 0px; padding-top: 0px; padding-bottom: 0px;' : 'height: auto; padding-top: 6px; padding-bottom: 6px;'}`,
      catPills: this.state.cats.map((c) => {
        const on = active === c.slug;
        return {
          name: c.name,
          href: `Danh Mục.dc.html#${c.slug}`,
          color: on ? '#c85200' : '#5f5a53',
          bg: on ? 'rgba(255,106,0,0.09)' : 'transparent',
        };
      }),
      experiences,
      ddOpen: this.state.ddOpen,
      openDd: () => this.setState({ ddOpen: true }),
      closeDd: () => this.setState({ ddOpen: false }),
      searchVal: this.state.searchVal,
      searchOpen: this.state.searchOpen && this.state.searchVal.trim().length > 0,
      searchResults: results,
      hasResults: results.length > 0,
      noResults: results.length === 0,
      onSearch: (e) => {
        const v = e.target.value;
        const res = this._data ? this._data.searchProducts(v).filter((p) => p.thumbnail).slice(0, 5) : [];
        this.setState({ searchVal: v, results: res, searchOpen: true });
      },
      onSearchFocus: () => { clearTimeout(this._blurTimer); this.setState({ searchOpen: true }); },
      onSearchBlur: () => { this._blurTimer = setTimeout(() => this.setState({ searchOpen: false }), 180); },
    };
  }
}
</script>
</body>
</html>
